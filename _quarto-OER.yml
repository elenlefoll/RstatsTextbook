execute:
  out-width: "90%"
  fig-width: 6
  fig-asp: 0.618
  
code-annotations: hover
lightbox: true

format:
  html:
    theme:
      light: cosmo
      dark: darkly
    css: style.css
    code-fold: false
    code-line-numbers: false
    code-overflow: wrap
    code-tools: false
    code-link: false
    #dev: ragg_png
    dev: cairo
    #df-print: kable
    filters:
      - line-highlight
    link-external-newwindow: true
    footnotes-hover: true
    author-meta: Elen Le Foll
    include-in-header:
      - text: |
          <style>
          .cell-output-stdout code {
            word-break: break-wor !important;
            white-space: pre-wrap !important;
          }
          </style>
    from: markdown+emoji

